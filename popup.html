<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --orange: #F26522;
      --orange-light: #FFF3EC;
      --gray-50: #FAFAFA;
      --gray-100: #F5F5F5;
      --gray-200: #EEEEEE;
      --gray-300: #E0E0E0;
      --gray-400: #BDBDBD;
      --gray-500: #9E9E9E;
      --gray-700: #616161;
      --gray-900: #212121;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', sans-serif;
      background: #fff;
      color: var(--gray-900);
      font-size: 13px;
      width: 360px;
      height: 500px;
      overflow: hidden;
      user-select: none;
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 14px;
      background: #fff;
      border-bottom: 1px solid var(--gray-200);
    }

    .header h1 {
      font-size: 14px;
      font-weight: 600;
      color: var(--gray-900);
      letter-spacing: -0.2px;
    }

    .header-actions { display: flex; gap: 6px; }

    .header-btn {
      width: 28px;
      height: 28px;
      border: none;
      background: var(--gray-100);
      border-radius: 7px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--gray-500);
      font-size: 15px;
      transition: all 0.15s;
    }

    .header-btn:hover { background: var(--gray-200); color: var(--gray-700); }

    /* Breadcrumb */
    .breadcrumb {
      display: flex;
      align-items: center;
      padding: 8px 14px;
      background: var(--gray-50);
      border-bottom: 1px solid var(--gray-200);
      gap: 4px;
      font-size: 12px;
      min-height: 34px;
    }

    .breadcrumb-item { color: var(--gray-500); cursor: pointer; transition: color 0.15s; }
    .breadcrumb-item:hover { color: var(--orange); }
    .breadcrumb-item.active { color: var(--gray-900); font-weight: 500; cursor: default; }
    .breadcrumb-sep { color: var(--gray-400); font-size: 10px; }

    /* Search */
    .search-bar { padding: 8px 14px; border-bottom: 1px solid var(--gray-200); }

    .search-bar input {
      width: 100%;
      padding: 7px 10px;
      border: 1px solid var(--gray-300);
      border-radius: 8px;
      font-size: 12px;
      outline: none;
      background: var(--gray-50);
      transition: border-color 0.15s;
    }

    .search-bar input:focus { border-color: var(--orange); background: #fff; }
    .search-bar input::placeholder { color: var(--gray-400); }

    /* Content */
    .content {
      overflow-y: auto;
      height: calc(500px - 44px - 34px - 42px - 40px);
      padding: 4px 0;
    }

    .content::-webkit-scrollbar { width: 4px; }
    .content::-webkit-scrollbar-track { background: transparent; }
    .content::-webkit-scrollbar-thumb { background: var(--gray-300); border-radius: 4px; }

    /* Folder */
    .folder-item {
      display: flex;
      align-items: center;
      padding: 9px 14px;
      cursor: pointer;
      transition: background 0.12s;
      gap: 10px;
    }

    .folder-item:hover { background: var(--gray-100); }

    .folder-icon {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      background: var(--orange-light);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .folder-info { flex: 1; min-width: 0; }
    .folder-name { font-weight: 500; font-size: 13px; }
    .folder-count { font-size: 11px; color: var(--gray-500); margin-top: 1px; }
    .folder-arrow { color: var(--gray-400); font-size: 14px; }

    .item-actions {
      display: flex;
      gap: 4px;
      opacity: 0;
      transition: opacity 0.15s;
    }

    .folder-item:hover .item-actions { opacity: 1; }

    /* Response */
    .response-item {
      display: flex;
      align-items: flex-start;
      padding: 9px 14px;
      cursor: pointer;
      transition: background 0.12s;
      gap: 10px;
      position: relative;
    }

    .response-item:hover { background: var(--orange-light); }
    .response-item.copied { background: #E8F5E9; }

    .response-icon {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      background: var(--gray-100);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .response-info { flex: 1; min-width: 0; }
    .response-title { font-weight: 500; font-size: 13px; }
    .response-preview {
      font-size: 11px;
      color: var(--gray-500);
      margin-top: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .copy-badge {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 10px;
      font-weight: 600;
      color: #4CAF50;
      opacity: 0;
      transition: opacity 0.2s;
    }

    .response-item.copied .copy-badge { opacity: 1; }

    .response-actions {
      display: flex;
      gap: 4px;
      opacity: 0;
      transition: opacity 0.15s;
    }

    .response-item:hover .response-actions { opacity: 1; }

    .action-btn {
      width: 22px;
      height: 22px;
      border: none;
      background: var(--gray-200);
      border-radius: 5px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--gray-500);
      font-size: 11px;
      transition: all 0.15s;
    }

    .action-btn:hover { background: var(--gray-300); color: var(--gray-700); }
    .action-btn.delete:hover { background: #FFEBEE; color: #E53935; }

    /* Empty state */
    .empty-state { text-align: center; padding: 40px 20px; color: var(--gray-400); }
    .empty-state p { font-size: 12px; margin-top: 8px; }

    /* Modal */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.3);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }

    .modal-overlay.active { display: flex; }

    .modal {
      background: #fff;
      border-radius: 12px;
      padding: 20px;
      width: 320px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.15);
    }

    .modal h3 { font-size: 14px; font-weight: 600; margin-bottom: 14px; }

    .modal label {
      display: block;
      font-size: 11px;
      font-weight: 500;
      color: var(--gray-500);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 4px;
      margin-top: 10px;
    }

    .modal label:first-of-type { margin-top: 0; }

    .modal input, .modal textarea {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid var(--gray-300);
      border-radius: 8px;
      font-size: 13px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.15s;
    }

    .modal input:focus, .modal textarea:focus { border-color: var(--orange); }
    .modal textarea { height: 80px; resize: vertical; }

    .modal-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 16px; }

    .btn {
      padding: 7px 16px;
      border: none;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
    }

    .btn-cancel { background: var(--gray-100); color: var(--gray-700); }
    .btn-cancel:hover { background: var(--gray-200); }
    .btn-primary { background: var(--orange); color: #fff; }
    .btn-primary:hover { background: #E05A1A; }

    /* Bottom bar */
    .bottom-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 8px 14px;
      background: #fff;
      border-top: 1px solid var(--gray-200);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .shortcut-hint { font-size: 10px; color: var(--gray-400); }

    .shortcut-hint kbd {
      background: var(--gray-100);
      border: 1px solid var(--gray-300);
      border-radius: 3px;
      padding: 1px 4px;
      font-family: inherit;
      font-size: 10px;
    }

    .add-btn {
      padding: 5px 12px;
      background: var(--orange);
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
    }

    .add-btn:hover { background: #E05A1A; }
  </style>
</head>
<body>
  <div class="header">
    <h1>Quick Responses</h1>
    <div class="header-actions">
      <button class="header-btn" id="backBtn" title="Back" style="display:none;">&#8592;</button>
    </div>
  </div>

  <div class="breadcrumb" id="breadcrumb"></div>

  <div class="search-bar">
    <input type="text" id="searchInput" placeholder="Search responses...">
  </div>

  <div class="content" id="content"></div>

  <div class="bottom-bar">
    <span class="shortcut-hint"><kbd>Option</kbd>+<kbd>Q</kbd> to open</span>
    <button class="add-btn" id="addBtn">+ New</button>
  </div>

  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <h3 id="modalTitle">New Response</h3>
      <div id="modalBody"></div>
      <div class="modal-actions">
        <button class="btn btn-cancel" id="modalCancel">Cancel</button>
        <button class="btn btn-primary" id="modalSave">Save</button>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>

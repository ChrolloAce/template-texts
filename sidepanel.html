<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #F4F1EA;
      --card: #FFFFFF;
      --ink: #0A0A0A;
      --muted: #6B6B6B;
      --accent: #F26522;
      --accent-soft: #FFE8D9;
      --green: #22C55E;
      --border: 2px solid #0A0A0A;
      --shadow: 4px 4px 0 #0A0A0A;
      --shadow-sm: 2px 2px 0 #0A0A0A;
      --shadow-lg: 6px 6px 0 #0A0A0A;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', sans-serif;
      background: var(--bg);
      color: var(--ink);
      font-size: 13px;
      width: 100%;
      height: 100vh;
      overflow: hidden;
      user-select: none;
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px;
      background: var(--card);
      border-bottom: var(--border);
    }

    .header h1 {
      font-size: 15px;
      font-weight: 800;
      color: var(--ink);
      letter-spacing: -0.3px;
      text-transform: uppercase;
    }

    .header-actions { display: flex; gap: 6px; }

    .header-btn {
      width: 28px;
      height: 28px;
      border: var(--border);
      background: var(--card);
      border-radius: 7px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 700;
      box-shadow: var(--shadow-sm);
      transition: all 0.1s;
    }

    .header-btn:hover { background: var(--accent-soft); }
    .header-btn:active { transform: translate(2px, 2px); box-shadow: none; }

    /* Tabs */
    .tabs {
      display: flex;
      gap: 8px;
      padding: 10px 16px;
      background: var(--bg);
      border-bottom: var(--border);
    }

    .tab {
      flex: 1;
      padding: 9px 12px;
      background: var(--card);
      border: var(--border);
      border-radius: 8px;
      font-size: 12px;
      font-weight: 800;
      cursor: pointer;
      text-align: center;
      box-shadow: var(--shadow-sm);
      transition: all 0.1s;
      text-transform: uppercase;
      letter-spacing: 0.3px;
      font-family: inherit;
    }

    .tab:hover { background: var(--accent-soft); }
    .tab.active { background: var(--ink); color: #fff; }
    .tab:active { transform: translate(2px, 2px); box-shadow: none; }

    /* Panels */
    .tab-panel { display: none; flex-direction: column; height: calc(100vh - 104px); }
    .tab-panel.active { display: flex; }

    /* Breadcrumb */
    .breadcrumb {
      display: flex;
      align-items: center;
      padding: 10px 16px;
      background: var(--bg);
      gap: 6px;
      font-size: 11px;
      min-height: 34px;
      font-weight: 700;
      flex-shrink: 0;
    }

    .breadcrumb-item { color: var(--muted); cursor: pointer; transition: color 0.1s; }
    .breadcrumb-item:hover { color: var(--accent); }
    .breadcrumb-item.active { color: var(--ink); cursor: default; }
    .breadcrumb-sep { color: var(--muted); font-size: 10px; }

    /* Search */
    .search-bar { padding: 0 16px 12px; background: var(--bg); flex-shrink: 0; }

    .search-bar input {
      width: 100%;
      padding: 10px 12px;
      border: var(--border);
      border-radius: 8px;
      font-size: 13px;
      outline: none;
      background: var(--card);
      box-shadow: var(--shadow-sm);
      font-family: inherit;
      font-weight: 500;
    }

    .search-bar input::placeholder { color: var(--muted); }

    /* Content */
    .content {
      overflow-y: auto;
      padding: 10px 16px 16px;
      background: var(--bg);
      flex: 1;
    }

    .content::-webkit-scrollbar { width: 6px; }
    .content::-webkit-scrollbar-track { background: transparent; }
    .content::-webkit-scrollbar-thumb { background: var(--ink); border-radius: 4px; }

    /* Card items */
    .card-item {
      display: flex;
      align-items: center;
      padding: 12px 14px;
      background: var(--card);
      border: var(--border);
      border-radius: 10px;
      margin-bottom: 10px;
      gap: 10px;
      cursor: pointer;
      box-shadow: var(--shadow);
      transition: all 0.1s;
      position: relative;
    }

    .card-item:hover { transform: translate(-1px, -1px); box-shadow: var(--shadow-lg); }
    .card-item:active { transform: translate(2px, 2px); box-shadow: var(--shadow-sm); }
    .card-item.copied { background: #DCFCE7; }

    .item-icon {
      width: 34px;
      height: 34px;
      border: var(--border);
      border-radius: 8px;
      background: var(--accent-soft);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-weight: 800;
      font-size: 15px;
    }

    .item-icon.response { background: var(--card); }

    .item-info { flex: 1; min-width: 0; }
    .item-name { font-weight: 700; font-size: 13px; color: var(--ink); }
    .item-meta {
      font-size: 10px;
      color: var(--muted);
      margin-top: 3px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }

    .item-preview {
      font-size: 11px;
      color: var(--muted);
      margin-top: 3px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .item-actions { display: flex; gap: 4px; flex-shrink: 0; }

    .mini-btn {
      width: 26px;
      height: 26px;
      border: var(--border);
      background: var(--card);
      border-radius: 6px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 700;
      transition: all 0.1s;
    }

    .mini-btn:hover { background: var(--accent-soft); }
    .mini-btn.delete:hover { background: #FECACA; }
    .mini-btn:active { transform: translate(1px, 1px); }

    .copy-badge {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 10px;
      font-weight: 800;
      color: #15803D;
      background: #DCFCE7;
      padding: 4px 9px;
      border: 2px solid #15803D;
      border-radius: 6px;
      opacity: 0;
      transition: opacity 0.2s;
      text-transform: uppercase;
    }

    .card-item.copied .copy-badge { opacity: 1; }
    .card-item.copied .item-actions { opacity: 0; }

    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: var(--muted);
      background: var(--card);
      border: var(--border);
      border-radius: 10px;
      box-shadow: var(--shadow);
    }

    .empty-state p { font-size: 12px; font-weight: 700; }

    /* Prayer Lock */
    .prayer-wrap { padding: 14px 16px; overflow-y: auto; }

    .review-card {
      background: var(--card);
      border: var(--border);
      border-radius: 12px;
      padding: 18px;
      box-shadow: var(--shadow);
      margin-bottom: 12px;
    }

    .review-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }

    .review-stars {
      font-size: 18px;
      color: #F59E0B;
      letter-spacing: 2px;
    }

    .review-date {
      font-size: 10px;
      color: var(--muted);
      font-weight: 700;
      text-transform: uppercase;
    }

    .review-title {
      font-size: 15px;
      font-weight: 800;
      margin-bottom: 10px;
      color: var(--ink);
      line-height: 1.3;
    }

    .review-content {
      font-size: 13px;
      line-height: 1.55;
      color: var(--ink);
      margin-bottom: 12px;
      user-select: text;
      max-height: 280px;
      overflow-y: auto;
      white-space: pre-wrap;
    }

    .review-author {
      font-size: 11px;
      color: var(--muted);
      font-weight: 700;
      font-style: italic;
    }

    .review-actions {
      display: flex;
      gap: 8px;
      margin-top: 12px;
    }

    .review-btn {
      flex: 1;
      padding: 9px;
      border: var(--border);
      border-radius: 8px;
      background: var(--card);
      font-size: 11px;
      font-weight: 800;
      cursor: pointer;
      box-shadow: var(--shadow-sm);
      text-transform: uppercase;
      letter-spacing: 0.3px;
      transition: all 0.1s;
      font-family: inherit;
    }

    .review-btn:hover { background: var(--accent-soft); }
    .review-btn.primary { background: var(--ink); color: #fff; }
    .review-btn.primary:hover { background: var(--accent); color: #fff; }
    .review-btn:active { transform: translate(2px, 2px); box-shadow: none; }

    .review-loading {
      text-align: center;
      padding: 40px 20px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      background: var(--card);
      border: var(--border);
      border-radius: 10px;
      box-shadow: var(--shadow);
    }

    .review-stat {
      display: flex;
      justify-content: space-between;
      font-size: 10px;
      color: var(--ink);
      text-transform: uppercase;
      font-weight: 800;
      padding: 10px 14px;
      background: var(--card);
      border: var(--border);
      border-radius: 8px;
      box-shadow: var(--shadow-sm);
      margin-bottom: 10px;
      letter-spacing: 0.3px;
    }

    /* Modal */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(10,10,10,0.4);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 100;
      padding: 16px;
    }

    .modal-overlay.active { display: flex; }

    .modal {
      background: var(--card);
      border: var(--border);
      border-radius: 12px;
      padding: 20px;
      width: 100%;
      max-width: 340px;
      box-shadow: var(--shadow-lg);
      max-height: 90vh;
      overflow-y: auto;
    }

    .modal h3 {
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 14px;
      text-transform: uppercase;
      letter-spacing: -0.2px;
    }

    .modal label {
      display: block;
      font-size: 10px;
      font-weight: 800;
      color: var(--ink);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
      margin-top: 12px;
    }

    .modal label:first-of-type { margin-top: 0; }

    .modal input, .modal textarea, .modal select {
      width: 100%;
      padding: 10px 12px;
      border: var(--border);
      border-radius: 8px;
      font-size: 13px;
      font-family: inherit;
      outline: none;
      background: var(--card);
      box-shadow: var(--shadow-sm);
      font-weight: 500;
    }

    .modal textarea { height: 100px; resize: vertical; }

    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      margin-top: 18px;
    }

    .btn {
      padding: 9px 18px;
      border: var(--border);
      border-radius: 8px;
      font-size: 12px;
      font-weight: 800;
      cursor: pointer;
      box-shadow: var(--shadow-sm);
      text-transform: uppercase;
      letter-spacing: 0.3px;
      transition: all 0.1s;
      font-family: inherit;
      background: var(--card);
    }

    .btn:hover { background: var(--accent-soft); }
    .btn:active { transform: translate(2px, 2px); box-shadow: none; }

    .btn-primary { background: var(--ink); color: #fff; }
    .btn-primary:hover { background: var(--accent); color: #fff; }

    /* Bottom bar */
    .bottom-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 10px 16px;
      background: var(--card);
      border-top: var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .shortcut-hint { font-size: 10px; color: var(--muted); font-weight: 700; }

    .shortcut-hint kbd {
      background: var(--bg);
      border: 1.5px solid var(--ink);
      border-radius: 4px;
      padding: 1px 5px;
      font-family: inherit;
      font-size: 10px;
      font-weight: 700;
      box-shadow: 1px 1px 0 var(--ink);
    }

    .add-btn {
      padding: 8px 16px;
      background: var(--accent);
      color: #fff;
      border: var(--border);
      border-radius: 8px;
      font-size: 11px;
      font-weight: 800;
      cursor: pointer;
      box-shadow: var(--shadow-sm);
      text-transform: uppercase;
      letter-spacing: 0.3px;
      transition: all 0.1s;
      font-family: inherit;
    }

    .add-btn:hover { background: #E05A1A; }
    .add-btn:active { transform: translate(2px, 2px); box-shadow: none; }

    /* App cards (Prayer Lock) */
    .app-card {
      background: var(--card);
      border: var(--border);
      border-radius: 14px;
      box-shadow: var(--shadow);
      overflow: hidden;
      position: relative;
      margin-bottom: 12px;
    }

    .review-app-card { padding: 18px; }

    .app-card-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
      padding-bottom: 12px;
      border-bottom: 2px solid var(--ink);
    }

    .app-logo {
      width: 42px;
      height: 42px;
      border: var(--border);
      border-radius: 10px;
      object-fit: cover;
      box-shadow: var(--shadow-sm);
      background: var(--accent);
    }

    .app-name {
      font-size: 14px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: -0.2px;
    }

    .app-tagline {
      font-size: 10px;
      color: var(--muted);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }

    .app-header-text { flex: 1; }

    .review-stars-big {
      font-size: 22px;
      color: #F59E0B;
      letter-spacing: 3px;
      margin-bottom: 10px;
    }

    .review-title-big {
      font-size: 16px;
      font-weight: 800;
      margin-bottom: 10px;
      line-height: 1.3;
      color: var(--ink);
    }

    .review-content-big {
      font-size: 13px;
      line-height: 1.55;
      margin-bottom: 14px;
      user-select: text;
      max-height: 240px;
      overflow-y: auto;
      white-space: pre-wrap;
      color: var(--ink);
    }

    .review-author-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding-top: 12px;
      border-top: 2px solid var(--ink);
    }

    .author-avatar {
      width: 38px;
      height: 38px;
      border: var(--border);
      border-radius: 50%;
      background: var(--accent-soft);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      font-size: 15px;
      box-shadow: var(--shadow-sm);
      flex-shrink: 0;
    }

    .author-name { font-weight: 700; font-size: 13px; color: var(--ink); }
    .author-sub { font-size: 10px; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.3px; }

    /* Verse card */
    .verse-app-card {
      min-height: 360px;
      background-size: cover;
      background-position: center;
      padding: 0;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .verse-top {
      padding: 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .verse-top .app-logo { background: #fff; }

    .verse-top-name {
      font-size: 13px;
      font-weight: 800;
      color: #fff;
      text-transform: uppercase;
      letter-spacing: -0.2px;
      text-shadow: 2px 2px 0 rgba(0,0,0,0.5);
    }

    .verse-overlay {
      background: linear-gradient(180deg, rgba(10,10,10,0) 0%, rgba(10,10,10,0.75) 45%, rgba(10,10,10,0.9) 100%);
      padding: 24px 20px 20px;
      color: #fff;
    }

    .verse-text {
      font-size: 16px;
      line-height: 1.5;
      font-weight: 600;
      font-style: italic;
      margin-bottom: 12px;
      user-select: text;
    }

    .verse-reference {
      font-size: 12px;
      font-weight: 800;
      opacity: 0.95;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .prayer-toolbar {
      display: flex;
      gap: 8px;
      margin-bottom: 14px;
    }

    .prayer-stat {
      display: flex;
      justify-content: space-between;
      font-size: 10px;
      color: var(--ink);
      text-transform: uppercase;
      font-weight: 800;
      padding: 9px 12px;
      background: var(--card);
      border: var(--border);
      border-radius: 8px;
      box-shadow: var(--shadow-sm);
      margin-bottom: 10px;
      letter-spacing: 0.3px;
    }

    .review-loading {
      text-align: center;
      padding: 40px 20px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      background: var(--card);
      border: var(--border);
      border-radius: 10px;
      box-shadow: var(--shadow);
    }

    /* Used dropdown */
    .used-dropdown { margin-top: 10px; }

    .used-list {
      margin-top: 8px;
      background: var(--card);
      border: var(--border);
      border-radius: 10px;
      box-shadow: var(--shadow);
      max-height: 280px;
      overflow-y: auto;
      padding: 6px;
    }

    .used-list::-webkit-scrollbar { width: 6px; }
    .used-list::-webkit-scrollbar-thumb { background: var(--ink); border-radius: 4px; }

    .used-item {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      padding: 10px;
      border-bottom: 1.5px solid var(--ink);
    }

    .used-item:last-child { border-bottom: none; }

    .used-item-info { flex: 1; min-width: 0; }

    .used-item-ref {
      font-size: 11px;
      font-weight: 800;
      color: var(--ink);
      text-transform: uppercase;
      letter-spacing: 0.3px;
      margin-bottom: 3px;
    }

    .used-item-text {
      font-size: 11px;
      color: var(--muted);
      line-height: 1.4;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .used-empty {
      text-align: center;
      padding: 20px;
      color: var(--muted);
      font-size: 11px;
      font-weight: 700;
    }

    .used-remove {
      flex-shrink: 0;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>Quick Responses</h1>
    <div class="header-actions">
      <button class="header-btn" id="backBtn" title="Back" style="display:none;">&#8592;</button>
    </div>
  </div>

  <div class="tabs">
    <button class="tab active" data-tab="responses">Templates</button>
    <button class="tab" data-tab="prayerlock">Prayer Lock</button>
  </div>

  <div class="tab-panel active" id="panel-responses">
    <div class="breadcrumb" id="breadcrumb"></div>
    <div class="search-bar">
      <input type="text" id="searchInput" placeholder="Search responses...">
    </div>
    <div class="content" id="content"></div>
  </div>

  <div class="tab-panel" id="panel-prayerlock">
    <div class="prayer-wrap" id="prayerContent" style="flex:1"></div>
  </div>

  <div class="bottom-bar">
    <span class="shortcut-hint"><kbd>Option</kbd>+<kbd>Q</kbd> toggle</span>
    <button class="add-btn" id="addBtn">+ New</button>
  </div>

  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <h3 id="modalTitle">New Response</h3>
      <div id="modalBody"></div>
      <div class="modal-actions">
        <button class="btn" id="modalCancel">Cancel</button>
        <button class="btn btn-primary" id="modalSave">Save</button>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
